<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الأضحى المبارك - دهانات كاستيللو</title>
    <style>
        /* إعدادات الخطوط والخلفية العامة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a0510;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #d4af37;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        p {
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* تنسيق صندوق الإدخال والأزرار */
        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #8a1538;
            border-radius: 25px;
            background-color: #fff;
            color: #333;
            outline: none;
            text-align: center;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        button {
            background-color: #8a1538;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 15px rgba(138, 21, 56, 0.4);
        }

        button:hover {
            background-color: #a01c43;
        }

        /* منطقة عرض الصورة والبطاقة */
        .preview-area {
            margin-top: 30px;
            position: relative;
            display: none; /* مخفي حتى يكتب العميل اسمه */
            justify-content: center;
        }

        /* حاوية الصورة والاسم */
        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-wrapper img {
            width: 100%;
            display: block;
        }

        /* تحديد مكان ظهور اسم العميل وتنسيقه فوق الصورة */
        .client-name {
            position: absolute;
            bottom: 22%; /* يضع الاسم بدقة في المساحة المخصصة فوق جملة شركاء النجاح */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #d4af37; /* لون ذهبي متناسق مع التصميم */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            background-color: #d4af37;
            color: #1a0510;
            margin-top: 20px;
        }

        .download-btn:hover {
            background-color: #f1c40f;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>تهنئة عيد الأضحى المبارك 🐑</h1>
        <p>عملاء شركة دهانات كاستيللو الكرام، اكتب اسمك أدناه لإنشاء بطاقة التهنئة الخاصة بك:</p>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="أدخل اسمك هنا..." maxlength="40">
            <br>
            <button onclick="generateGreeting()">إنشاء التهنئة</button>
        </div>

        <div class="preview-area" id="previewArea">
