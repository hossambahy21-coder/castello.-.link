<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الأضحى - دهانات كاستيللو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a0510;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card-input {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-placeholder {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        p {
            color: #ccb3c2;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 85%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #8a1538;
            border-radius: 30px;
            background-color: #fff;
            color: #333;
            outline: none;
            text-align: center;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .submit-btn {
            background-color: #8a1538;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 21, 56, 0.4);
        }

        .submit-btn:hover {
            background-color: #a01c43;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card-input">
        <div class="logo-placeholder">Castello | دهانات كاستيللو</div>
        <h1>تهنئة عيد الأضحى المبارك 🐑</h1>
        <p>مرحباً بكم في منصة تهاني كاستيللو. يرجى كتابة اسمكم الكريم لنقوم بتجهيز بطاقة التهنئة الخاصة بكم:</p>
        
        <input type="text" id="clientName" placeholder="اكتب اسمك الثلاثي أو الثنائي هنا..." maxlength="40">
        <br>
        <button class="submit-btn" onclick="goToGreetingPage()">عرض التهنئة</button>
    </div>

    <script>
        function goToGreetingPage() {
            const name = document.getElementById('clientName').value.trim();
            if (name === "") {
                alert("من فضلك، قم بكتابة الاسم أولاً لتوليد التهنئة!");
                return;
            }
            // التوجيه إلى الصفحة الثانية مع تمرير الاسم في الرابط
            window.location.href = "greeting.html?name=" + encodeURIComponent(name);
        }
    </script>

</body>
</html>
