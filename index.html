<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الأضحى المبارك - دهانات كاستيللو</title>
    <style>
        /* إعدادات الخطوط والخلفية العامة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a0510;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #d4af37;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        /* تنسيق صندوق الإدخال والأزرار */
        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #8a1538;
            border-radius: 25px;
            background-color: #fff;
            color: #333;
            outline: none;
            text-align: center;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        button {
            background-color: #8a1538;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 15px rgba(138, 21, 56, 0.4);
        }

        button:hover {
            background-color: #a01c43;
        }

        /* منطقة عرض الصورة والبطاقة */
        .preview-area {
            margin-top: 30px;
            position: relative;
            display: none; /* مخفي حتى يكتب العميل اسمه */
            justify-content: center;
        }

        /* حاوية الصورة والاسم */
        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-wrapper img {
            width: 100%;
            display: block;
        }

        /* تحديد مكان ظهور اسم العميل وتنسيقه فوق الصورة */
        .client-name {
            position: absolute;
            bottom: 25%; /* يضع الاسم بدقة فوق جملة "شركاء النجاح" */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #d4af37; /* لون ذهبي يتناسب مع التصميم الإضافي */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            background-color: #d4af37;
            color: #1a0510;
            margin-top: 20px;
        }

        .download-btn:hover {
            background-color: #f1c40f;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>تهنئة عيد الأضحى المبارك 🐑</h1>
        <p>عملاء شركة دهانات كاستيللو الكرام، اكتب اسمك أدناه لإنشاء بطاقة التهنئة الخاصة بك:</p>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="أدخل اسمك هنا..." maxlength="40">
            <br>
            <button onclick="generateGreeting()">إنشاء التهنئة</button>
        </div>

        <div class="preview-area" id="previewArea">
            <div>
                <div class="card-wrapper" id="greetingCard">
                    <img src="https://i.ibb.co/v4bN3Wff/castello-eid.jpg" alt="Castello Greeting" crossorigin="anonymous">
                    <div class="client-name" id="displayName"></div>
                </div>
                <button class="download-btn" onclick="downloadImage(WhatsApp Image 2026-05-26 at 6.08.10 AM)">تحميل الصورة</button>
            </div>
        </div>
    </div>

    <script>
        function generateGreeting() {
            const nameInput = document.getElementById('userName').value.trim();
            const previewArea = document.getElementById('previewArea');
            const displayName = document.getElementById('displayName');

            if (nameInput === "") {
                alert("من فضلك أدخل اسمك أولاً!");
                return;
            }

            // وضع اسم العميل في المكان المخصص
            displayName.textContent = nameInput;
            
            // إظهار منطقة المعاينة بسلاسة
            previewArea.style.display = 'flex';
            previewArea.scrollIntoView({ behavior: 'smooth' });
        }

        function downloadImage() {
            const card = document.getElementById('greetingCard');
            
            // تحويل الحاوية (الصورة + الاسم) إلى صورة Canvas واحدة للتحميل
            html2canvas(card, {
                useCORS: true, // للسماح بتحميل الصور من سيرفر خارجي دون مشاكل حماية
                scale: 2 // لزيادة جودة الصورة عند التحميل
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `كاستيللو_تهنئة_${document.getElementById('userName').value}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>

</body>
</html>
