<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة التهنئة - دهانات كاستيللو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a0510;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        #finalImagePreview {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: block;
            margin: 0 auto;
        }

        .action-btns {
            margin-top: 20px;
        }

        button {
            font-family: 'Cairo', sans-serif;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn {
            background-color: #d4af37;
            color: #1a0510;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .back-btn:hover {
            background-color: #f1c40f;
        }

        #loadingMessage {
            color: #d4af37;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        
        <div id="loadingMessage">جاري دمج اسمكم الكريم مع التهنئة...</div>

        <div id="greetingCardArea">
            <div id="finalImagePreviewContainer">
                </div>
        </div>

        <div class="action-btns">
            <button class="back-btn" onclick="window.location.href='index.html'">إنشاء تهنئة جديدة</button>
        </div>

    </div>

    <div style="position: fixed; top: -10000px; left: -10000px; overflow: hidden;">
        <div id="greetingCardTemplate" style="position: relative; width: 1200px; height: 1200px;">
            <img src="https://i.ibb.co/6RbyV5rN/Whats-App-Image-2026-05-26-at-6-08-10-AM.jpg" id="originalImage" alt="Original Image" crossorigin="anonymous" style="width: 100%; height: 100%; display: block;">
            
            <div id="templateDisplayName" style="position: absolute; bottom: 21.5%; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; font-family: 'Cairo', sans-serif; font-size: 68px; font-weight: bold; color: #d4af37; text-shadow: 4px 4px 10px rgba(0, 0, 0, 1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px;">
                اسم العميل
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            const originalImage = document.getElementById('originalImage');
            const templateDisplayName = document.getElementById('templateDisplayName');
            
            if (!name) {
                templateDisplayName.textContent = "عميل كاستيللو";
            } else {
                templateDisplayName.textContent = name;
            }

            originalImage.onload = function() {
                generateMergedImage();
            };
            
            if (originalImage.complete) {
                generateMergedImage();
            }
        };

        function generateMergedImage() {
            const cardTemplate = document.getElementById('greetingCardTemplate');
            const imagePreviewContainer = document.getElementById('finalImagePreviewContainer');
            const loadingMessage = document.getElementById('loadingMessage');
            
            html2canvas(cardTemplate, {
                useCORS: true,
                scale: 1
            }).then(canvas => {
                const finalImageUrl = canvas.toDataURL('image/png');
                
                const finalImgElement = document.createElement('img');
                finalImgElement.src = finalImageUrl;
                finalImgElement.id = 'finalImagePreview';
                finalImgElement.alt = 'Castello Eid Greeting';
                
                imagePreviewContainer.innerHTML = '';
                imagePreviewContainer.appendChild(finalImgElement);
                
                loadingMessage.style.display = 'none';
            });
        }
    </script>

</body>
</html>
